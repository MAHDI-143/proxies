name: Auto-Update Proxies
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Scrape proxies
        run: python -c "
import requests, re
from concurrent.futures import ThreadPoolExecutor

sources = [
    'https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http',
    'https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt',
]

proxies = set()
for url in sources:
    try:
        r = requests.get(url, timeout=10)
        found = re.findall(r'\d+\.\d+\.\d+\.\d+:\d+', r.text)
        proxies.update(found)
        print(f'Got {len(found)} from {url.split(\"/\")[2]}')
    except: pass

print(f'Total unique: {len(proxies)}')

def test(p):
    try:
        r = requests.get('http://httpbin.org/ip', proxies={'http': f'http://{p}'}, timeout=5)
        return p if r.status_code == 200 else None
    except: return None

working = []
with ThreadPoolExecutor(max_workers=30) as ex:
    for p in list(proxies)[:200]:
        result = ex.submit(test, p).result()
        if result:
            working.append(result)
            print(f'✓ {result}')

with open('proxies.txt', 'w') as f:
    f.write('\n'.join(working))
print(f'\n✅ Saved {len(working)} proxies')
"
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add proxies.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update proxies"
          git push
