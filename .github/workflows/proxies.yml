name: Proxies
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install requests
      run: pip install requests
    - name: Run scraper
      run: python scraper.py
    - name: Commit and push
      run: |
        git config user.email "bot@github.com"
        git config user.name "GitHub Bot"
        git add proxies.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "auto-update proxies"
        git push
