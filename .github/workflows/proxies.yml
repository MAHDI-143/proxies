name: Proxies
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: curl -s "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http" > proxies.txt
    - run: curl -s "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt" >> proxies.txt
    - run: sort -u proxies.txt -o proxies.txt
    - run: |
        git config user.email "bot@github.com"
        git config user.name "GitHub Bot"
        git add proxies.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "update proxies"
        git push
