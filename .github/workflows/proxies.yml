name: Proxies
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install requests
      run: pip install requests
    - name: Run proxy scraper
      run: |
        python -c "
import requests
import re
from concurrent.futures import ThreadPoolExecutor, as_completed
import time

print('Fetching proxies...')
sources = [
    'https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http',
    'https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt',
]

proxies = set()
for url in sources:
    try:
        r = requests.get(url, timeout=10)
        found = re.findall(r'\d+\.\d+\.\d+\.\d+:\d+', r.text)
        proxies.update(found)
        print(f'Got {len(found)} from source')
    except:
        pass

print(f'Total to test: {len(proxies)}')
print('Testing proxies...')

def test(p):
    try:
        start = time.time()
        r = requests.get('http://httpbin.org/ip', proxies={'http': f'http://{p}'}, timeout=5)
        if r.status_code == 200:
            return p
    except:
        pass
    return None

working = []
with ThreadPoolExecutor(max_workers=30) as ex:
    futures = [ex.submit(test, p) for p in list(proxies)[:300]]
    for future in as_completed(futures):
        result = future.result()
        if result:
            working.append(result)
            print(f'Working: {result}')

with open('proxies.txt', 'w') as f:
    f.write('\n'.join(working))
print(f'Saved {len(working)} working proxies')
"
    - name: Commit and push
      run: |
        git config user.email "bot@github.com"
        git config.user.name "GitHub Bot"
        git add proxies.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "auto-update proxies"
        git push
