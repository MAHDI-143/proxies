name: Proxies
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download latest working proxies
      run: |
        # This file is updated hourly with freshly tested, working proxies [citation:4]
        curl -s "https://raw.githubusercontent.com/jetkai/proxy-list/main/online-proxies/txt/proxies-http.txt" > proxies.txt
        echo "✅ Downloaded $(wc -l < proxies.txt) proxies"
    - name: Commit and push
      run: |
        git config user.email "bot@github.com"
        git config user.name "GitHub Bot"
        git add proxies.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "auto-update proxies"
        git push
